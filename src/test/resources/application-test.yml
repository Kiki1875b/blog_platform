spring:
  sql:
    init:
      mode: always
  jpa:
#    hibernate:
#      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    hikari:
      maxLifetime: 3000000     # 30초마다 커넥션 강제로 교체
      idleTimeout: 1000000     # 오래된 idle 연결 빨리 제거
      minimumIdle: 0
      maximumPoolSize: 20
      validationTimeout: 5000
      connectionTimeout: 20000

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client
            client-secret: test-secret
            scope: profile,email
            redirect-uri: "http://localhost:8080/login/oauth2/code/google"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo

app:
  cookies:
    secure: false
  jwt:
    secret: test-test-test-test-test-test-test
    access-exp-ms: 3600000
    refresh-exp-ms: 1209600000
  client-url: "http://localhost:3000"
  aws:
    s3:
      bucket: dummy
      bucket-url: dummy
custom:
  oauth2:
    base-url: "http://localhost:8080"

cloud:
  aws:
    credentials:
      accessKey: dummy
      secretKey: dummy
    region:
      static: ap-northeast-2
    presigned-url-expiration: 600
    expected-prefix: uploads/profile/

decorator:
  datasource:
    p6spy:
      enable-logging: false
